services:
  postgres:
    image: postgres:16-alpine
    container_name: farmerp360_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: farmerp360
      POSTGRES_USER: farmerp360_user
      POSTGRES_PASSWORD: farmerp360_secret_2024
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U farmerp360_user -d farmerp360"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - farmerp360_net

  redis:
    image: redis:7-alpine
    container_name: farmerp360_redis
    restart: unless-stopped
    command: redis-server --requirepass farmerp360_redis_2024
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "farmerp360_redis_2024", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - farmerp360_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: farmerp360_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://farmerp360_user:farmerp360_secret_2024@postgres:5432/farmerp360
      REDIS_URL: redis://:farmerp360_redis_2024@redis:6379/0
      SECRET_KEY: farmerp360_jwt_super_secret_key_change_in_production_2024
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      REFRESH_TOKEN_EXPIRE_DAYS: 30
      ENVIRONMENT: development
      CORS_ORIGINS: '["http://localhost:3000","http://localhost","http://127.0.0.1:3000"]'
      UPLOAD_DIR: /app/uploads
      MAX_FILE_SIZE: 10485760
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - farmerp360_net
    command: >
      sh -c "python init_db.py &&
             python seed.py &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: farmerp360_frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_API_URL: /api/v1
      NEXT_PUBLIC_APP_NAME: FarmERP360
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - farmerp360_net

  nginx:
    image: nginx:alpine
    container_name: farmerp360_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - farmerp360_net

volumes:
  postgres_data:
  redis_data:
  uploads_data:

networks:
  farmerp360_net:
    driver: bridge
